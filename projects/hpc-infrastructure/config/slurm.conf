# -------------------------------
# Basic cluster identity
# -------------------------------
ClusterName=slurmcluster-uop
ControlMachine=comp-1-genericvnf-vm-0
ControlAddr=10.10.10.22

SlurmUser=slurm
StateSaveLocation=/var/spool/slurm/state
SlurmdSpoolDir=/var/spool/slurmd

# Authentication
AuthType=auth/munge

# -------------------------------
# Process tracking (no cgroups)
# -------------------------------
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none

# -------------------------------
# Timeouts
# -------------------------------
SlurmctldTimeout=300
SlurmdTimeout=300
ReturnToService=2

# -------------------------------
# Nodes
# -------------------------------
NodeName=big-node \
    NodeAddr=10.10.10.22 \
    NodeHostName=comp-1-genericvnf-vm-0 \
    CPUs=64 RealMemory=128000 State=UNKNOWN

NodeName=small-node \
    NodeAddr=10.10.10.7 \
    NodeHostName=comp-small-1-genericvnf-vm-0 \
    CPUs=32 RealMemory=64000 State=UNKNOWN

# -------------------------------
# Partitions
# -------------------------------
PartitionName=short Nodes=big-node,small-node Default=YES MaxTime=INFINITE State=UP

# -------------------------------
# Discord epilog
# -------------------------------
Epilog=/usr/local/sbin/slurm-discord-epilog

# -------------------------------
# No accounting DB
# -------------------------------
AccountingStorageType=accounting_storage/none

# END
